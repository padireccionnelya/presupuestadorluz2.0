<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Punto Ahorro - Presupuesto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script>
    const DESTINO = "https://script.google.com/macros/s/AKfycbwpmRJgMKT6xmq9sP9Z9zTS4amUN00L1XKPPMLpkqwKoDSMlnyJEJpUtJCQ_i30Vw1r/exec";

    function abrirDestino() {
      try {
        if (window.top !== window.self) {
          window.top.location.href = DESTINO;
        } else {
          window.location.replace(DESTINO);
        }
      } catch (e) {
        try {
          window.location.href = DESTINO;
        } catch (_) {}
      }
    }

    setTimeout(abrirDestino, 300);
  </script>

  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, sans-serif;
      background: #fafafa;
      color: #065f46;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    img {
      height: 60px;
      margin-bottom: 20px;
    }
    .msg { font-size: 18px; font-weight: 600; }
    .muted { color: #6b7280; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <img src="https://tupuntoahorro.com/wp-content/uploads/2024/02/F2-Logo-Punto-Ahorro-1024x328.jpg" alt="Punto Ahorro">
  <div class="msg">Abriendo presupuestador… ⚡</div>
  <div class="muted">Si ClickUp lo bloquea, ábrelo en grande</div>
</body>
</html>
